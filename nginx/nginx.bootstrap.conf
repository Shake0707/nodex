# Bootstrap config — used ONLY for initial Let's Encrypt cert issuance.
# nginx loads this when SSL certs do not yet exist.
# After certs are obtained, replace with nginx.conf and reload nginx.

upstream web_upstream {
    server web:3000;
}

upstream api_upstream {
    server api:4000;
}

server {
    listen 80;
    server_name nodex.uz www.nodex.uz;

    # Let certbot prove domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve the site over HTTP temporarily (no redirect)
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
