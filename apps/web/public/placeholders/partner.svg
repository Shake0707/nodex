<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <pattern id="grid-p" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,212,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#15151F"/>
  <rect width="600" height="200" fill="url(#grid-p)"/>

  <!-- Subtle glitch stripes -->
  <rect x="0" y="93" width="600" height="1" fill="rgba(0,212,255,0.09)"/>
  <rect x="0" y="107" width="600" height="1" fill="rgba(168,85,247,0.07)"/>

  <!-- Glitch offset block -->
  <rect x="180" y="90" width="80" height="3" fill="rgba(0,212,255,0.06)" rx="0"/>
  <rect x="340" y="107" width="60" height="2" fill="rgba(168,85,247,0.08)" rx="0"/>

  <!-- Corner brackets — cyan -->
  <path d="M 16 38 L 16 16 L 38 16" fill="none" stroke="rgba(0,212,255,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 562 16 L 584 16 L 584 38" fill="none" stroke="rgba(0,212,255,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 16 162 L 16 184 L 38 184" fill="none" stroke="rgba(0,212,255,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <path d="M 584 162 L 584 184 L 562 184" fill="none" stroke="rgba(0,212,255,0.55)" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Main label -->
  <text x="300" y="105" text-anchor="middle" dominant-baseline="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="17" fill="rgba(0,212,255,0.5)" letter-spacing="0.22em">[ PARTNER ]</text>
</svg>
